<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Rephraser</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <img src="images/logo.png" alt="AI Rephraser Logo" class="logo" width="100" height="100">
    <h1>AI Rephraser</h1>
    <h3>Perfect Your Words, Anywhere You Chat</h3>
  </header>

  <section>
    <textarea id="userMessage" placeholder="Enter your message here..."></textarea>
    <br>
    <button id="rephraseBtn" type="button" class="rephrase-btn">Rephrase</button>
    <button id="resetBtn" type="button" class="reset-btn">Reset</button>
  </section>

  <div id="results"></div>


  <script src="script.js"></script>
</body>
</html>
